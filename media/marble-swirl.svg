<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="">
  <!-- Liquid-marble texture echoing the RBGA poster artwork: banded orange, teal
       and moss gradients pushed around by fractal noise. Static file, no script. -->
  <defs>
    <linearGradient id="bands" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0.00" stop-color="#1E6F66"/>
      <stop offset="0.10" stop-color="#6E9B4E"/>
      <stop offset="0.18" stop-color="#F0EFA9"/>
      <stop offset="0.26" stop-color="#1E6F66"/>
      <stop offset="0.36" stop-color="#0F4A44"/>
      <stop offset="0.46" stop-color="#6E9B4E"/>
      <stop offset="0.54" stop-color="#E8862B"/>
      <stop offset="0.62" stop-color="#E4622C"/>
      <stop offset="0.70" stop-color="#F0EFA9"/>
      <stop offset="0.78" stop-color="#1E6F66"/>
      <stop offset="0.88" stop-color="#0F4A44"/>
      <stop offset="1.00" stop-color="#6E9B4E"/>
    </linearGradient>

    <linearGradient id="veins" x1="0.2" y1="0" x2="1" y2="0.8">
      <stop offset="0.00" stop-color="#E4622C"/>
      <stop offset="0.22" stop-color="#F0EFA9" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#E8862B"/>
      <stop offset="0.68" stop-color="#1E6F66" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#F0EFA9"/>
      <stop offset="1.00" stop-color="#0F4A44" stop-opacity="0"/>
    </linearGradient>

    <!-- Wide, slow noise displaces the bands into the poured-paint swirl, then
         a discrete transfer quantises the result so the bands keep hard edges.
         Without the posterise step this reads as watercolour, not screen print. -->
    <filter id="swirl" x="-25%" y="-25%" width="150%" height="150%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.004"
                    numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="210"
                         xChannelSelector="R" yChannelSelector="G"
                         result="pushed"/>
      <feComponentTransfer in="pushed" result="posterised">
        <feFuncR type="discrete" tableValues="0.06 0.12 0.35 0.62 0.78 0.91 0.97"/>
        <feFuncG type="discrete" tableValues="0.24 0.36 0.47 0.58 0.71 0.84 0.94"/>
        <feFuncB type="discrete" tableValues="0.16 0.24 0.30 0.40 0.55 0.68 0.80"/>
      </feComponentTransfer>
      <feGaussianBlur in="posterised" stdDeviation="0.6"/>
    </filter>

    <!-- Second, tighter pass draws the fine ripple lines running through the bands. -->
    <filter id="ripple" x="-25%" y="-25%" width="150%" height="150%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.007"
                    numOctaves="4" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="110"
                         xChannelSelector="R" yChannelSelector="B"
                         result="pushed"/>
      <feComponentTransfer in="pushed">
        <feFuncR type="discrete" tableValues="0.10 0.45 0.75 0.95"/>
        <feFuncG type="discrete" tableValues="0.25 0.50 0.72 0.90"/>
        <feFuncB type="discrete" tableValues="0.18 0.35 0.55 0.78"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Base fill guarantees full coverage if a filter is unsupported. -->
  <rect width="1200" height="800" fill="#1E6F66"/>

  <g filter="url(#swirl)">
    <rect x="-200" y="-200" width="1600" height="1200" fill="url(#bands)"/>
  </g>

  <g filter="url(#ripple)" opacity="0.55">
    <rect x="-200" y="-200" width="1600" height="1200" fill="url(#veins)"/>
  </g>
</svg>
